                        <div class="post__content">
                            <p>SELinux 模式共分为 3 种：<br>强制模式：Enforcing<br>许可模式：Permissive<br>禁用模式：Disabled</p>
<details ><summary>点击显/隐</summary><div class="fold-content"><figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br></pre></td><td class="code"><pre><span class="line">[root@localhost ~]# getenforce    # 显示 SELinux 模式</span><br><span class="line">Enforcing</span><br><span class="line">[root@localhost ~]# setenforce 0    # 修改 SELinux 模式，未对配置文件使用</span><br><span class="line">[root@localhost ~]# getenforce</span><br><span class="line">Permissive</span><br><span class="line">[root@localhost ~]# reboot    # 重启，</span><br><span class="line">[root@localhost koinl]# getenforce    # 失效</span><br><span class="line">Enforcing</span><br><span class="line">[root@localhost koinl]# vi /etc/sysconfig/selinux     # 修改 SELinux 配置文件</span><br><span class="line">[root@localhost koinl]# getenforce    # 重启生效</span><br><span class="line">Enforcing</span><br><span class="line">[root@localhost koinl]# reboot</span><br><span class="line">[root@localhost koinl]# getenforce</span><br><span class="line">Permissive</span><br><span class="line">[root@localhost koinl]# semanage port -l | grep http    # 显示 SELinux 的 http 服务端口</span><br><span class="line">http_cache_port_t              tcp      8080, 8118, 8123, 10001-10010</span><br><span class="line">http_cache_port_t              udp      3130</span><br><span class="line">http_port_t                    tcp      80, 81, 443, 488, 8008, 8009, 8443, 9000</span><br><span class="line">pegasus_http_port_t            tcp      5988</span><br><span class="line">pegasus_https_port_t           tcp      5989</span><br><span class="line">[root@localhost koinl]# semanage port -a -t http_cache_port_t -p udp 8888    # 修改第二个端口：增加一个 8888 的端口号</span><br><span class="line">[root@localhost koinl]# semanage port -l | grep http | head -2</span><br><span class="line">http_cache_port_t              tcp      8080, 8118, 8123, 10001-10010</span><br><span class="line">http_cache_port_t              udp      8888, 3130</span><br><span class="line">[root@localhost koinl]# semanage port -d -t http_cache_port_t -p udp 8888    # 修改第二个端口：删除一个 8888 的端口号</span><br><span class="line">[root@localhost koinl]# semanage port -l | grep http | head -2</span><br><span class="line">http_cache_port_t              tcp      8080, 8118, 8123, 10001-10010</span><br><span class="line">http_cache_port_t              udp      3130</span><br></pre></td></tr></table></figure></div></details>
